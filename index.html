<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicación del Clima | Premium</title>
    <meta name="description" content="Consulta el clima de hasta 3 ciudades con un diseño moderno.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <h1 class="main-title">🌤️ WeatherApp</h1>
            <p class="app-instructions">Escribe hasta 3 ciudades separadas por comas (Ej: Bogotá, Madrid, Tokio) para consultar su clima actual y pronóstico semanal.</p>
        </header>

        <section class="search-section">
            <form id="search-form" class="search-box">
                <input type="text" id="city-input" placeholder="Busca aquí..." autocomplete="off" required>
                <button type="submit" aria-label="Buscar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
        </section>

        <div id="status-container" class="status-container hidden">
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Procesando...</p>
            </div>
            
            <div id="error-message" class="error-message hidden">
                <p></p>
            </div>
        </div>

        <section id="cards-container" class="cards-layout">
            <!-- Las tarjetas se generan dinámicamente aquí -->
        </section>

        <!-- Pie de página: Créditos y Atribuciones -->
        <footer class="app-footer">
            <span class="credits-label">Créditos</span>
            <div class="tooltip-box">
                Datos meteorológicos proveídos gratuitamente por <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo</a>.<br>
                Datos geográficos base cortesía de contribuyentes en <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener noreferrer">OpenStreetMap</a>.
            </div>
        </footer>
    </main>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
